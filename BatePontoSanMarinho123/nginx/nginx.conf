server {
    listen 80;
    listen [::]:80;
    server_name pontosanmarinho.com.br www.pontosanmarinho.com.br;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name pontosanmarinho.com.br www.pontosanmarinho.com.br;

    ssl_certificate /etc/letsencrypt/live/pontosanmarinho.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pontosanmarinho.com.br/privkey.pem;

    root /var/www/html;
    index index.html;

    client_max_body_size 20M;

    location /uploads/ {
        proxy_pass http://back-san:4000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /relatorios/ {
        proxy_pass http://back-san:4000/relatorios/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://back-san:4000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /apiFace/ {
        proxy_pass http://face-san:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}